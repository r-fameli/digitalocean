name: batch-inference-engine
region: nyc
services:
  - name: api
    environment_slug: python
    git:
      branch: main
      repo_clone_url: https://github.com/r-fameli/digitalocean.git
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: bash start.sh
    source_dir: /
    health_check:
      http_path: /
      initial_delay_seconds: 10
    envs:
      - key: INFERENCE_URL
        value: http://localhost:8081/infer
        scope: RUN_TIME
        type: GENERAL
      - key: DURABLE_DB_PATH
        value: /workspaces/orchestrator.db
        scope: RUN_TIME
        type: GENERAL
      - key: POOL_SIZE
        value: "5"
        scope: RUN_TIME
        type: GENERAL
      - key: TTL_DAYS
        value: "7"
        scope: RUN_TIME
        type: GENERAL
